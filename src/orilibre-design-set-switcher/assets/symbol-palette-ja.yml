symbol-palette:
  - symbol_id: waterway-name
    type: symbol
    layout:
      symbol-placement: line
      symbol-spacing: 350
      text-field: "{name:ja}"
      text-font:
        - Noto Sans Italic
      text-letter-spacing: 0.2
      text-max-width: 5
      text-rotation-alignment: map
      text-size: 14
    paint:
      text-color: "#333"
      text-halo-color: rgba(255,255,255,0.7)
      text-halo-width: 2
    property:
      color-key: overlay.placeholder_text
