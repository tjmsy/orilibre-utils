          - town
  - symbol_id:
      - mountain-peaks
    links:
      - source: ofm
        source-layer: mountain_peak
        filter:
          - all
          - - "=="
            - $type
            - Point
          - - <=
            - rank
            - 2
          - - has
            - name
          - - "!="
            - name
            - ""
  - symbol_id:
