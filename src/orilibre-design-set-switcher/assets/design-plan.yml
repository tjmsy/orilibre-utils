        filter:
          - all
          - - "=="
            - $type
            - LineString
          - - in
            - class
            - minor
            - service
            - track
  - symbol_id:
      - highway-name-major
    links:
      - source: ofm
        source-layer: transportation_name
        filter:
          - in
          - class
          - primary
          - secondary
          - tertiary
          - trunk
  - symbol_id:
