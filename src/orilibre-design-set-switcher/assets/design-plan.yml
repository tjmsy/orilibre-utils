sources:
  ofm:
    type: vector
    url: https://tiles.openfreemap.org/planet
rules:
  - symbol_id:
      - waterway-name
    links:
      - source: ofm
        source-layer: waterway
        filter:
          - all
          - - "=="
            - $type
            - LineString
          - - has
            - name
  - symbol_id:
      - water-name-lakeline
    links:
      - source: ofm
        source-layer: water_name
        filter:
          - "=="
          - $type
          - LineString
  - symbol_id:
      - water-name-ocean
    links:
      - source: ofm
        source-layer: water_name
        filter:
          - all
          - - "=="
            - $type
            - Point
          - - in
            - class
            - ocean
            - sea
  - symbol_id:
      - water-name-other
    links:
      - source: ofm
        source-layer: water_name
        filter:
          - all
          - - "=="
            - $type
            - Point
          - - "!in"
            - class
            - ocean
            - sea
  - symbol_id:
      - poi-park
    links:
      - source: ofm
        source-layer: poi
        filter:
          - all
          - - "=="
            - $type
            - Point
          - - has
            - name
          - - "=="
            - class
            - park
  - symbol_id:
      - poi-level-3
    links:
      - source: ofm
        source-layer: poi
        filter:
          - all
          - - '=='
            - $type
            - Point
          - - '>='
            - rank
            - 25
          - - any
            - - '!has'
              - level
            - - '=='
              - level
              - 0
  - symbol_id:
      - poi-level-2
    links:
      - source: ofm
        source-layer: poi
        filter:
          - all
          - - '=='
            - $type
            - Point
          - - <=
            - rank
            - 24
          - - '>='
            - rank
            - 15
          - - any
            - - '!has'
              - level
            - - '=='
              - level
              - 0
  - symbol_id:
      - poi-level-1
    links:
      - source: ofm
        source-layer: poi
        filter:
          - all
          - - '=='
            - $type
            - Point
          - - <=
            - rank
            - 14
          - - has
            - name
          - - any
            - - '!has'
              - level
            - - '=='
              - level
              - 0
  - symbol_id:
      - poi-railway
    links:
      - source: ofm
        source-layer: poi
        filter:
          - all
          - - "=="
            - $type
            - Point
          - - has
            - name
          - - "=="
            - class
            - railway
          - - "=="
            - subclass
            - station
  - symbol_id:
      - highway-name-path
    links:
      - source: ofm
        source-layer: transportation_name
        filter:
          - "=="
          - class
          - path
  - symbol_id:
